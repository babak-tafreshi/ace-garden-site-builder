name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Build production site
        run: npm run build

      - name: Copy CNAME to build output
        run: |
          cp CNAME dist/CNAME
          touch dist/.nojekyll

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v5
        with:
          publish_dir: ./dist
          publish_branch: gh-pages
          commit_message: "Deploy site to gh-pages"
          github_token: ${{ secrets.GITHUB_TOKEN }}
